# OfficeTool v2.0 GA — 生产环境 Docker Compose 全量编排 (W12.1)
#
# 使用:  docker compose -f docker-compose.prod.yml up -d
# 要求:  8C16G 服务器 + Docker 24+
# 环境变量文件: .env.prod

services:
  # ══════════════════════════════════════════════════════════
  # 基础设施
  # ══════════════════════════════════════════════════════════

  postgres:
    image: postgres:15-alpine
    container_name: officetool-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-officetool}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-officetool}
      POSTGRES_DB: ${DB_NAME:-officetool}
    ports:
      - "127.0.0.1:5432:5432"  # 仅本地回环
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-officetool}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { memory: 512M }
        reservations: { memory: 256M }
    networks:
      - officetool-net

  redis:
    image: redis:7-alpine
    container_name: officetool-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits: { memory: 256M }
    networks:
      - officetool-net

  minio:
    image: minio/minio:RELEASE.2024-01-01T00-00-00Z
    container_name: officetool-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits: { memory: 512M }
    networks:
      - officetool-net

  # ══════════════════════════════════════════════════════════
  # 向量数据库
  # ══════════════════════════════════════════════════════════

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: officetool-etcd
    restart: unless-stopped
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    volumes:
      - etcd_data:/etcd
    deploy:
      resources:
        limits: { memory: 256M }
    networks:
      - officetool-net

  milvus:
    image: milvusdb/milvus:v2.3.4
    container_name: officetool-milvus
    restart: unless-stopped
    depends_on: [etcd]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "127.0.0.1:19530:19530"
    volumes:
      - milvus_data:/var/lib/milvus
    command: milvus run standalone
    deploy:
      resources:
        limits: { memory: 2G }
    networks:
      - officetool-net

  # ══════════════════════════════════════════════════════════
  # 全文检索 + 知识图谱
  # ══════════════════════════════════════════════════════════

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: officetool-es
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE 'green|yellow'"]
      interval: 15s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        limits: { memory: 1536M }
    networks:
      - officetool-net

  neo4j:
    image: neo4j:5.21-community
    container_name: officetool-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - neo4j_data:/data
    deploy:
      resources:
        limits: { memory: 768M }
    networks:
      - officetool-net

  # ══════════════════════════════════════════════════════════
  # 后端 + Celery
  # ══════════════════════════════════════════════════════════

  backend:
    build: .
    container_name: officetool-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: "postgresql+asyncpg://${DB_USER:-officetool}:${DB_PASSWORD:-officetool}@postgres:5432/${DB_NAME:-officetool}"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
      MINIO_ENDPOINT: "minio:9000"
      MILVUS_HOST: "milvus"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-password}"
      LLM_PROVIDER: "${LLM_PROVIDER:-deepseek}"
      LLM_DEEPSEEK_API_KEY: "${LLM_DEEPSEEK_API_KEY}"
      LLM_DEEPSEEK_MODEL: "${LLM_DEEPSEEK_MODEL:-deepseek-chat}"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      DEBUG: "false"
      DB_POOL_SIZE: "20"
      HF_ENDPOINT: "https://hf-mirror.com"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4 --limit-concurrency 50"
    deploy:
      resources:
        limits: { memory: 3G }
        reservations: { memory: 1G }
    networks:
      - officetool-net

  celery-worker:
    build: .
    container_name: officetool-celery
    restart: unless-stopped
    command: >
      celery -A tasks.celery_app worker
      --loglevel=info --pool=threads --concurrency=4
      -Q default
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: "postgresql+asyncpg://${DB_USER:-officetool}:${DB_PASSWORD:-officetool}@postgres:5432/${DB_NAME:-officetool}"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
      MINIO_ENDPOINT: "minio:9000"
      MILVUS_HOST: "milvus"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-password}"
      PYTHONPATH: "/app"
      HF_ENDPOINT: "https://hf-mirror.com"
      KG_ENABLED: "true"
    deploy:
      resources:
        limits: { memory: 3G }
        reservations: { memory: 512M }
    networks:
      - officetool-net

  # ══════════════════════════════════════════════════════════
  # Nginx 反向代理 + 前端
  # ══════════════════════════════════════════════════════════

  nginx:
    image: nginx:1.25-alpine
    container_name: officetool-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - ssl_certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    deploy:
      resources:
        limits: { memory: 128M }
    networks:
      - officetool-net

volumes:
  pg_data:
  redis_data:
  minio_data:
  etcd_data:
  milvus_data:
  es_data:
  neo4j_data:
  frontend_dist:   # 由前端构建流水线填充
  ssl_certs:       # certbot SSL 证书

networks:
  officetool-net:
    driver: bridge
