# OfficeTool MVP 开发环境 Docker Compose
services:
  # ========== 基础服务 ==========

  postgres:
    image: postgres:15-alpine
    container_name: officetool-pg
    environment:
      POSTGRES_USER: officetool
      POSTGRES_PASSWORD: officetool
      POSTGRES_DB: officetool
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U officetool"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - officetool-net

  redis:
    image: redis:7-alpine
    container_name: officetool-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - officetool-net

  minio:
    image: minio/minio:latest
    container_name: officetool-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    networks:
      - officetool-net

  # ========== 向量数据库 ==========

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: officetool-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd
    networks:
      - officetool-net

  milvus:
    image: milvusdb/milvus:v2.3.4
    container_name: officetool-milvus
    depends_on:
      - etcd
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - officetool-net
    command: milvus run standalone

  # ========== Elasticsearch (全文检索) ==========

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: officetool-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE 'green|yellow'"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - officetool-net

  # ========== Neo4j (知识图谱) ==========

  neo4j:
    image: neo4j:5.21-community
    container_name: officetool-neo4j
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - officetool-net

  # ========== 后端 API ==========

  backend:
    build: .
    container_name: officetool-backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://officetool:officetool@postgres:5432/officetool
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MILVUS_HOST=milvus
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      # Celery 任务提交
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      # LLM 配置
      - LLM_PROVIDER=deepseek
      - LLM_DEEPSEEK_API_KEY=${LLM_DEEPSEEK_API_KEY:-your-deepseek-api-key}
      - LLM_DEEPSEEK_MODEL=deepseek-chat
      # Embedding 模型下载镜像（国内加速）
      - HF_ENDPOINT=https://hf-mirror.com
    volumes:
      - .:/app
    networks:
      - officetool-net

  # ========== Celery Worker ==========

  celery-worker:
    build: .
    container_name: officetool-celery
    command: celery -A tasks.celery_app worker --loglevel=info --pool=threads --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://officetool:officetool@postgres:5432/officetool
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MINIO_ENDPOINT=minio:9000
      - MILVUS_HOST=milvus
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - PYTHONPATH=/app
      # Embedding 模型下载镜像（国内加速）
      - HF_ENDPOINT=https://hf-mirror.com
    volumes:
      - .:/app
    networks:
      - officetool-net

volumes:
  pg_data:
  redis_data:
  minio_data:
  etcd_data:
  milvus_data:
  es_data:
  neo4j_data:

networks:
  officetool-net:
    driver: bridge
