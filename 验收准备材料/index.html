<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一周增肌健身计划</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>💪 增肌健身计划</h1>
            <p class="subtitle">初学者专属 · 每周4-5练 · 科学增肌</p>
        </div>
    </header>

    <nav class="week-nav">
        <div class="container">
            <div class="week-days">
                <button class="day-btn active" data-day="mon">周一<br><span>上肢A</span></button>
                <button class="day-btn" data-day="tue">周二<br><span>下肢A</span></button>
                <button class="day-btn" data-day="wed">周三<br><span>休息</span></button>
                <button class="day-btn" data-day="thu">周四<br><span>上肢B</span></button>
                <button class="day-btn" data-day="fri">周五<br><span>下肢B</span></button>
                <button class="day-btn" data-day="sat">周六<br><span>休息</span></button>
                <button class="day-btn" data-day="sun">周日<br><span>休息</span></button>
            </div>
        </div>
    </nav>

    <main class="container">
        <section id="workout-content">
            <!-- 内容由JS动态填充 -->
        </section>

        <section class="tips-section">
            <h2>⚡ 增肌要点</h2>
            <div class="tips-grid">
                <div class="tip-card">
                    <h3>🎯 循序渐进</h3>
                    <p>前2-4周专注于动作标准，再逐步增加重量</p>
                </div>
                <div class="tip-card">
                    <h3>🥗 热量盈余</h3>
                    <p>每日摄入热量比消耗多300-500卡</p>
                </div>
                <div class="tip-card">
                    <h3>🥩 蛋白质充足</h3>
                    <p>每公斤体重1.6-2g蛋白质</p>
                </div>
                <div class="tip-card">
                    <h3>😴 充足睡眠</h3>
                    <p>每天7-9小时睡眠，肌肉在休息时生长</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>坚持就是胜利！💪🔥</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
